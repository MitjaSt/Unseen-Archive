<!DOCTYPE html>
<html>
<head>
  <title>Icon Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    canvas {
      border: 1px solid #ddd;
      margin: 10px;
    }
    .icon-container {
      display: inline-block;
      margin: 10px;
      text-align: center;
    }
    button {
      padding: 10px 20px;
      margin: 10px 0;
      cursor: pointer;
      background: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
    }
    button:hover {
      background: #357ae8;
    }
  </style>
</head>
<body>
  <h1>Unseen Archive - Icon Generator</h1>
  <p>Click the button below to generate placeholder icons. Right-click each icon to save.</p>

  <button onclick="generateIcons()">Generate Icons</button>

  <div id="icons"></div>

  <script>
    function generateIcons() {
      const sizes = [16, 48, 128];
      const container = document.getElementById('icons');
      container.innerHTML = '';

      sizes.forEach(size => {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');

        // Background gradient
        const gradient = ctx.createLinearGradient(0, 0, size, size);
        gradient.addColorStop(0, '#1a5490');
        gradient.addColorStop(1, '#2d7ab8');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, size, size);

        // Draw "U" letter
        ctx.fillStyle = 'white';
        ctx.font = `bold ${size * 0.6}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('U', size / 2, size / 2);

        // Create download link
        const link = document.createElement('a');
        link.download = `icon-${size}.png`;
        link.href = canvas.toDataURL('image/png');
        link.textContent = `Download icon-${size}.png`;

        const div = document.createElement('div');
        div.className = 'icon-container';
        div.appendChild(canvas);
        div.appendChild(document.createElement('br'));
        div.appendChild(link);

        container.appendChild(div);
      });
    }
  </script>
</body>
</html>
